<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.a{
    background-color: aqua;
    height: 1000px;
    text-align: center;
}

h1{
    background-color: chartreuse;
    width: 400px;
    height: 200px;
    border: 2px solid red;
    border-radius: 3px;
    text-align: center;
    line-height: 200px;

    position: relative; /* IMPORTANT */
    
    animation-name: harry2;
    animation-duration: 5s;
    animation-iteration-count: 3;
    animation-fill-mode: forwards;
}

@keyframes harry2{
    0%{
        top: 0px;
        left: 0px;
    }
    25%{
        top: 250px;
        left: 0px;
    }
    75%{
        top: 250px;
        left: 250px;
    }
    100%{
        top: 0px;
        left: 250px;
    }
}
</style>
<body>
    <div class="a">
        <h1>animation</h1>
    </div>
</body>
</html>
