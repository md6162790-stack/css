<html>
    <head>
        <style>
        .container{
            background-color: deepskyblue;
            border: 5px solid burlywood;
            padding-left: 50px;
            width: 500px;
        }
        h1{
            text-align: center;
            background-color: brown;
            color: azure;
            width: 400px;
        }
        p.r{
            display:none;
        }
        p.s{
            display: inline;
        }
        p.a{
            display: block;
        }
        p.p{
            display: inline-block;
        }
        </style>
    </head>
    <body>
        <div class="container">
        <h1>none</h1>
        <div>
            hell welcome to home
            <p class="r">hello</p>
            welcome to css tutorial
            </div>
            <h1>Inline</h1>
        <div>
            hell welcome to home
            <p class="s">hello</p>
            welcome to css tutorial
            </div>
            <h1>block</h1>
        <div>
            hell welcome to home
            <p class="a">hello</p>
            welcome to css tutorial
            </div>
            <h1>inline-block</h1>
        <div>
            hell welcome to home
            <p class="p">hello</p>
            welcome to css tutorial
            </div>
            </div>
    </body>
</html>
