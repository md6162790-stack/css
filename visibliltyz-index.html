<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            border: 4px solid black;
            border-radius:5px;
            background-color: aqua;
            height: 500px;
            width: 700px;
            text-justify:auto;
        }
        .box{
            border: 3px solid green;
            width:100px;
            height: 100px;
        }
        #box1{
            background-color: blue;
            color: black;
            position: relative;
            top: 49px;
            z-index: 40;
        }
          #box2{
            background-color:brown;
            color: black;
           /* visibility:hidden; //it creates  space box color will gone
            display: none;  clearing that space*/ 
            position: relative;
            /* top:14px;  for moving color to top over the top box*/ 
            z-index: 35;
        }
          #box3{
            background-color:cadetblue;
            color: black;
        }
          #box4{
            background-color:coral;
            color: black;
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="box" id="box1"> box1</div>
    <div class="box" id="box2">box2</div>
    <div class="box" id="box3">box3</div>
    <div class="box" id="box4">box4</div>
    </div>
</body>
</html>
