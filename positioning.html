    <head>

            .container{

            }.box{
                display: inline-block;
                border: 3px solid blue;
                width: 150px;
                height: 200px;
                margin: 3px;
            }
            #box3{
                position: relative;
                top: 3px;
            }
        </style>
        <body>
            <div class="container">
                <div class="box" id="box1">1</div>
                <div class="box" id="box2">2</div>
                <div class="box" id="box3">3</div>
                <div class="box" id="box4">4</div>
            </div>
        </body>
    </head>
</html>
